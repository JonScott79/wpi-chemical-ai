<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPI Predict</title>
	
	<!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	
	<!-- fonts -->
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<header>
	<a href="index.html" class="logo">
		<img
			src="assets/logos/wpi-predict-logo.png"
			alt="WPI Predict">
	</a>

    <nav>
        <a href="#">Research</a>
        <a href="#">Documentation</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<main>

    <div class="app-window">

        <div class="window-title">
            Molecular Property Prediction
        </div>

		<div class="window-body">

			<div class="input-group">

			<input 
				id="smiles"
				type="text"
				placeholder="SMILES Formula">

			<button
				id="drawButton"
				class="draw">
				Draw Molecule
			</button>

			</div>

			<select>
				<option value="" selected disabled>Select Prediction Model</option>
				<option>LogP</option>
				<option>Boiling Point</option>
				<option>Melting Point</option>
				<option>Enthalpy of Vaporization</option>
				<option>Enthalpy of Fusion</option>
				<option>Hansen Parameters</option>
			</select>

			<button class="run">
				Run Prediction
			</button>

		</div>
        </div>

    </div>

</main>

<footer>

    <span>Version 0.1 Prototype</span>
    <span>Worcester Polytechnic Institute</span>

</footer>


<!-- =====================================
     JSME Modal
===================================== -->

<div id="jsmeModal" class="modal hidden">

    <div class="modal-window">

        <div class="modal-header">

            <h2>Draw Molecule</h2>

            <button
                id="closeJsme"
                class="modal-close">
                ✕
            </button>

        </div>

        <div class="modal-body">

            <div id="jsme_container"></div>

        </div>

        <div class="modal-footer">

            <button
                id="cancelJsme"
                class="draw">
                Cancel
            </button>

            <button
                id="applyJsme"
                class="run">
                Apply
            </button>

        </div>

    </div>

</div>

<!-- =====================================
SCRIPTS
=====================================  -->
<!-- JSME -->
<script src="backend/api/jsme/jsme/jsme.nocache.js"></script>

<!-- WPI Predict -->
<script src="js/jsme.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
