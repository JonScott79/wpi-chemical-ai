<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPI Chemical AI Platform</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo">WPI <span>Chemical AI</span></div>

    <nav>
        <a href="#">Research</a>
        <a href="#">Documentation</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<main>

    <div class="app-window">

        <div class="window-title">
            Chemical Prediction Platform
        </div>

		<div class="window-body">

			<div class="input-group">

				<input
					type="text"
					placeholder="SMILES Formula">

				<button class="draw">
					Draw Molecule
				</button>

			</div>

			<select>

				<option>Select Prediction Model</option>
				<option>Oil Yield Prediction</option>
				<option>Gas Composition</option>
				<option>Plastic Classification</option>

			</select>

			<button class="run">
				Run Prediction
			</button>

		</div>
        </div>

    </div>

</main>

<footer>
    <span>Version 0.1 Prototype</span>
    <span>Worcester Polytechnic Institute</span>
</footer>

</body>
</html>
