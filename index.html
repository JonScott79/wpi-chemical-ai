<!DOCTYPE html>
<html lang="en">

<head>

    <!-- =====================================
         Metadata
    ====================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WPI Predict</title>

    <!-- =====================================
         Styles
    ====================================== -->

    <link rel="stylesheet" href="css/style.css">

    <!-- Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- =====================================
     Header
===================================== -->

<header>

    <a
        href="index.html"
        class="logo"
        aria-label="WPI Predict Home">

        <img
            src="assets/logos/wpi-predict-logo.png"
            alt="WPI Predict">

    </a>

    <nav aria-label="Primary Navigation">

        <a href="#">Research</a>
        <a href="#">Documentation</a>
        <a href="#">About</a>
        <a href="#">Contact</a>

    </nav>

</header>

<!-- =====================================
     Main
===================================== -->

<main id="main-content">

    <section
        class="app-window"
        aria-labelledby="pageTitle">

        <h1
            id="pageTitle"
            class="window-title">

            Molecular Property Prediction

        </h1>

        <div class="window-body">

            <!-- Input -->

            <div class="input-group">

                <label
                    for="smiles"
                    class="sr-only">

                    SMILES Formula

                </label>

                <input
                    id="smiles"
                    type="text"
                    placeholder="SMILES Formula"
                    autocomplete="off">

                <button
                    id="drawButton"
                    class="draw"
                    type="button"
                    aria-label="Open molecular editor">

                    Draw Molecule

                </button>

            </div>
			
			<!-- Data Validation -->
			<div
			id="smilesValidation"
			class="validation-message"
			aria-live="polite">
			</div>

            <!-- Prediction Model -->

            <label
                for="predictionModel"
                class="sr-only">

                Prediction Model

            </label>

            <select id="predictionModel">

                <option value="" selected disabled>
                    Select Prediction Model
                </option>

                <option>LogP</option>
                <option>Boiling Point</option>
                <option>Melting Point</option>
                <option>Enthalpy of Vaporization</option>
                <option>Enthalpy of Fusion</option>
                <option>Hansen Parameters</option>

            </select>

            <!-- Run -->

			<button
				id="runPrediction"
				class="run"
				type="button">

				Run Prediction

			</button>

		</div>

	</section>

</main>

<!-- =====================================
     Footer
===================================== -->

<footer>

    <span id="version"></span>

    <span>Worcester Polytechnic Institute</span>

</footer>

<!-- =====================================
     JSME Modal
===================================== -->

<div
    id="jsmeModal"
    class="modal hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="jsmeTitle">

    <div class="modal-window">

        <div class="modal-header">

            <h2 id="jsmeTitle">

                Draw Molecule

            </h2>

            <button
                id="closeJsme"
                class="modal-close"
                type="button"
                aria-label="Close molecular editor">

                ✕

            </button>

        </div>

        <div class="modal-body">

            <div id="jsme_container"></div>

        </div>

        <div class="modal-footer">

            <button
                id="cancelJsme"
                class="draw"
                type="button">

                Cancel

            </button>

            <button
                id="applyJsme"
                class="run"
                type="button">

                Apply

            </button>

        </div>

    </div>

</div>

<!-- =====================================
     Prediction Modal
===================================== -->

<div
    id="predictionModal"
    class="modal hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="predictionTitle">

    <div class="modal-window">

        <div class="modal-header">

            <h2 id="predictionTitle">

                Prediction Results

            </h2>

            <button
                id="closePrediction"
                class="modal-close"
                type="button"
                aria-label="Close prediction results">

                ✕

            </button>

        </div>

        <div class="modal-body">

            <div id="outputContent">

                Waiting for prediction...

            </div>

        </div>

        <div class="modal-footer">

            <button
                id="copyOutput"
                class="draw"
                type="button">

                Copy

            </button>

            <button
                id="printOutput"
                class="draw"
                type="button">

                Print

            </button>

            <button
                id="closePredictionFooter"
                class="run"
                type="button">

                Close

            </button>

        </div>

    </div>

</div>

<!-- =====================================
     Scripts
===================================== -->

<script src="backend/api/jsme/jsme/jsme.nocache.js"></script>

<script src="js/version.js"></script>

<script src="js/jsme.js"></script>
<script src="js/api.js"></script>
<script src="js/validation.js"></script>
<script src="js/app.js"></script>

</body>

</html>
